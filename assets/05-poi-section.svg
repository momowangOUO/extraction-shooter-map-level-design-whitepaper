<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">POI 多入口剖面</title>
  <desc id="desc">三层 POI 剖面图，入口 callout 与建筑主体保持安全间距，箭头锚定楼层边缘。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#f1f5f9"/></linearGradient>
    <linearGradient id="hot" x1="0" x2="1"><stop offset="0" stop-color="#be123c"/><stop offset="1" stop-color="#fb7185"/></linearGradient>
    <linearGradient id="mid" x1="0" x2="1"><stop offset="0" stop-color="#b45309"/><stop offset="1" stop-color="#f59e0b"/></linearGradient>
    <linearGradient id="cool" x1="0" x2="1"><stop offset="0" stop-color="#0f766e"/><stop offset="1" stop-color="#14b8a6"/></linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity=".12"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M1 1 L9 5 L1 9 Z" fill="#475569"/></marker>
  </defs>
  <style>
    .h1{font:700 25px "Microsoft YaHei",Arial,sans-serif;fill:#0f172a}.sub{font:400 12px "Microsoft YaHei",Arial,sans-serif;fill:#64748b}.floor{fill:#f8fafc;stroke:#cbd5e1;stroke-width:1.5;filter:url(#soft-shadow)}.wall{fill:#cbd5e1;stroke:#94a3b8}.label{font:700 13px "Microsoft YaHei",Arial,sans-serif;fill:#0f172a;text-anchor:middle;dominant-baseline:middle}.cap{font:400 10.5px "Microsoft YaHei",Arial,sans-serif;fill:#64748b;text-anchor:middle;dominant-baseline:middle}.call{fill:#fff;stroke:#d8e0ea;filter:url(#soft-shadow)}.edge{fill:none;stroke:#475569;stroke-width:2.3;stroke-linecap:round;marker-end:url(#arrow)}.dash{fill:none;stroke:#0f766e;stroke-width:2.3;stroke-linecap:round;stroke-dasharray:7 6;marker-end:url(#arrow)}.white{font:700 11px "Microsoft YaHei",Arial,sans-serif;fill:#fff;text-anchor:middle;dominant-baseline:middle}
  </style>
  <!-- 背景层 -->
  <rect width="800" height="600" rx="18" fill="url(#bg)"/>
  <text class="h1" x="48" y="52">POI 多入口剖面</text>
  <text class="sub" x="48" y="76">进入方式定义风险：快、隐蔽、垂直、噪声和撤退各有代价。</text>

  <!-- 建筑层 -->
  <g>
    <rect class="floor" x="200" y="342" width="390" height="64" rx="9"/>
    <rect class="floor" x="230" y="260" width="330" height="64" rx="9"/>
    <rect class="floor" x="270" y="178" width="250" height="64" rx="9"/>
    <rect class="wall" x="214" y="366" width="362" height="16" rx="4"/>
    <rect class="wall" x="244" y="284" width="302" height="16" rx="4"/>
    <rect class="wall" x="284" y="202" width="222" height="16" rx="4"/>
    <rect x="345" y="189" width="92" height="32" rx="7" fill="url(#hot)"/>
    <rect x="284" y="271" width="78" height="32" rx="7" fill="url(#mid)"/>
    <rect x="466" y="353" width="78" height="32" rx="7" fill="url(#cool)"/>
  </g>

  <!-- 连线层 -->
  <g>
    <path class="edge" d="M132 374 L200 374"/>
    <path class="edge" d="M668 374 L590 374"/>
    <path class="dash" d="M238 468 C260 420 295 354 323 303"/>
    <path class="dash" d="M391 132 L391 178"/>
    <path class="edge" d="M520 214 C590 226 638 274 648 332"/>
    <path class="edge" d="M362 303 C390 326 422 344 466 366"/>
  </g>

  <!-- 说明卡层 -->
  <g>
    <rect class="call" x="54" y="330" width="92" height="78" rx="9"/><text class="label" x="100" y="356">正门</text><text class="cap" x="100" y="382">最快</text><text class="cap" x="100" y="398">暴露高</text>
    <rect class="call" x="654" y="330" width="92" height="78" rx="9"/><text class="label" x="700" y="356">货梯门</text><text class="cap" x="700" y="382">噪声高</text><text class="cap" x="700" y="398">撤退快</text>
    <rect class="call" x="176" y="468" width="110" height="70" rx="9"/><text class="label" x="231" y="493">排水沟</text><text class="cap" x="231" y="518">低姿态绕入</text>
    <rect class="call" x="336" y="92" width="110" height="58" rx="9"/><text class="label" x="391" y="116">天窗</text><text class="cap" x="391" y="137">垂直入口</text>
    <rect class="call" x="608" y="205" width="124" height="78" rx="9"/><text class="label" x="670" y="231">撤退梯</text><text class="cap" x="670" y="256">离开更快</text><text class="cap" x="670" y="272">进入更难</text>
  </g>

  <!-- 文本层 -->
  <g>
    <text class="white" x="391" y="205">核心库房</text><text class="white" x="323" y="287">电力间</text><text class="white" x="505" y="369">医务室</text>
    <rect class="call" x="476" y="480" width="244" height="58" rx="10"/>
    <text class="label" x="598" y="502">POI 验收句</text>
    <text class="cap" x="598" y="526">每条入口都应回答：快在哪里，贵在哪里，暴露在哪里。</text>
  </g>
</svg>
