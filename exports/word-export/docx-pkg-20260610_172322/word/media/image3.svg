<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">Demo v0 墙体与路线坐标规划图</title>
  <desc id="desc">以左下原点、Y 向上的设计坐标展示 300×300 Demo v0 的主墙线分组、核心路线和撤离路线。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f5f3ff"/>
    </linearGradient>
    <linearGradient id="map-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f3f4f6"/>
      <stop offset="1" stop-color="#e5e7eb"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#111827" flood-opacity=".15"/>
    </filter>
    <marker id="arrow-r" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1 L9 5 L1 9 Z" fill="#0f766e"/>
    </marker>
    <marker id="arrow-e" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1 L9 5 L1 9 Z" fill="#be123c"/>
    </marker>
  </defs>
  <style>
    .h1{font:700 24px "Microsoft YaHei",Arial,sans-serif;fill:#111827}
    .sub{font:400 12px "Microsoft YaHei",Arial,sans-serif;fill:#64748b}
    .panel{fill:#fff;stroke:#e2e8f0;filter:url(#soft-shadow)}
    .map{fill:url(#map-bg);stroke:#1f2937;stroke-width:1.9}
    .grid-minor{stroke:#cbd5e1;stroke-width:.45;opacity:.42}
    .grid-major{stroke:#94a3b8;stroke-width:.7;opacity:.72}
    .axis-label{font:700 6px "Microsoft YaHei",Arial,sans-serif;fill:#475569;text-anchor:middle;dominant-baseline:middle}
    .wall{fill:none;stroke:#374151;stroke-width:2.1;stroke-linecap:square}
    .tier0{fill:#dc3b34}.tier1{fill:#d97706}.tier2{fill:#6d28d9}
    .spawn{fill:#fff;stroke:#16a34a;stroke-width:5}.extract{fill:#fff;stroke:#dc3b34;stroke-width:5}
    .route-main{fill:none;stroke:#0f766e;stroke-width:2.2;stroke-linecap:round;stroke-dasharray:7 5;marker-end:url(#arrow-r)}
    .route-extract{fill:none;stroke:#be123c;stroke-width:2.4;stroke-linecap:round;stroke-dasharray:4 4;marker-end:url(#arrow-e)}
    .wall-tag{font:700 6.5px "Microsoft YaHei",Arial,sans-serif;fill:#111827;text-anchor:middle;dominant-baseline:middle}
    .tag-bg{fill:#fff;stroke:#cbd5e1;stroke-width:.6;opacity:.92}
    .tiny{font:700 8px "Microsoft YaHei",Arial,sans-serif;fill:#fff;text-anchor:middle;dominant-baseline:middle}
    .label{font:700 7px "Microsoft YaHei",Arial,sans-serif;fill:#111827;text-anchor:middle;dominant-baseline:middle}
    .legend-title{font:700 14px "Microsoft YaHei",Arial,sans-serif;fill:#111827}
    .legend{font:700 11px "Microsoft YaHei",Arial,sans-serif;fill:#111827}
    .note{font:400 10.5px "Microsoft YaHei",Arial,sans-serif;fill:#64748b}
    .coord{font:400 9px "Consolas","Microsoft YaHei",monospace;fill:#475569}
  </style>

  <!-- 背景层 -->
  <rect width="800" height="600" rx="18" fill="url(#bg)"/>
  <text class="h1" x="44" y="40">Demo v0 墙体与路线坐标规划图</text>
  <text class="sub" x="44" y="62">所有可见坐标均为设计坐标：左下 (0,0)，右上 (300,300)，X 向右，Y 向上。</text>

  <!-- 地图层 -->
  <g transform="translate(44 84) scale(1.55)">
    <rect class="map" x="0" y="0" width="300" height="300" rx="2"/>

    <!-- 坐标网格层：25 单位细线，50 单位主线；标签按 Y 向上显示 -->
    <path class="grid-minor" d="M25 0 V300 M75 0 V300 M125 0 V300 M175 0 V300 M225 0 V300 M275 0 V300 M0 25 H300 M0 75 H300 M0 125 H300 M0 175 H300 M0 225 H300 M0 275 H300"/>
    <path class="grid-major" d="M50 0 V300 M100 0 V300 M150 0 V300 M200 0 V300 M250 0 V300 M0 50 H300 M0 100 H300 M0 150 H300 M0 200 H300 M0 250 H300"/>
    <text class="axis-label" x="-14" y="0">300</text><text class="axis-label" x="-14" y="50">250</text><text class="axis-label" x="-14" y="100">200</text><text class="axis-label" x="-14" y="150">150</text><text class="axis-label" x="-14" y="200">100</text><text class="axis-label" x="-14" y="250">50</text><text class="axis-label" x="-14" y="300">0</text>
    <text class="axis-label" x="0" y="314">0</text><text class="axis-label" x="50" y="314">50</text><text class="axis-label" x="100" y="314">100</text><text class="axis-label" x="150" y="314">150</text><text class="axis-label" x="200" y="314">200</text><text class="axis-label" x="250" y="314">250</text><text class="axis-label" x="300" y="314">300</text>

    <!-- 节点层：物资区 -->
    <rect class="tier2" x="24" y="28" width="54" height="34" rx="1.5"/><text class="tiny" x="51" y="45">T2</text>
    <rect class="tier2" x="236" y="2" width="64" height="48" rx="1.5"/><text class="tiny" x="268" y="26">T2</text>
    <rect class="tier2" x="84" y="89" width="28" height="48" rx="1.5"/><text class="tiny" x="98" y="113">T2</text>
    <rect class="tier2" x="235" y="107" width="53" height="40" rx="1.5"/><text class="tiny" x="262" y="127">T2</text>
    <rect class="tier2" x="60" y="235" width="32" height="63" rx="1.5"/><text class="tiny" x="76" y="266">T2</text>
    <rect class="tier2" x="160" y="184" width="55" height="28" rx="1.5"/><text class="tiny" x="188" y="198">T2</text>
    <rect class="tier1" x="38" y="164" width="46" height="46" rx="1.5"/><text class="tiny" x="61" y="187">T1</text>
    <rect class="tier1" x="166" y="113" width="49" height="46" rx="1.5"/><text class="tiny" x="191" y="136">T1</text>
    <rect class="tier1" x="207" y="250" width="91" height="48" rx="1.5"/><text class="tiny" x="253" y="274">T1</text>
    <rect class="tier0" x="84" y="184" width="38" height="26" rx="1.5"/><text class="tiny" x="103" y="197">T0</text>

    <!-- 墙体层 -->
    <path class="wall" d="M19 18 H83 M104 0 V17 M115 17 H234 M234 17 V51 M243 50 H287 M287 59 V105 M244 105 H287 V147"/>
    <path class="wall" d="M18 30 V64 M18 64 H83 M83 30 H104 M94 64 H158 M158 30 V78 M158 78 H94"/>
    <path class="wall" d="M0 89 H64 M38 101 V149 M0 164 H20 M20 164 V187 M18 212 H38"/>
    <path class="wall" d="M83 88 V137 M112 88 H139 M160 89 V136 M162 89 H215 M215 89 V136"/>
    <path class="wall" d="M236 107 V139 M236 149 H300 M267 164 V237 M203 160 V238 M177 183 H215 V300"/>
    <path class="wall" d="M38 210 V236 H58 V282 M58 236 H190 M125 213 H203 M112 267 V300 M127 267 H191"/>
    <path class="wall" d="M0 187 H38 M58 164 H84 M84 164 V210 M58 210 H122 M123 210 H203 M203 250 H267 M202 267 V300"/>

    <!-- 连线层：核心路线 -->
    <polyline class="route-main" points="9,47 48,80 76,126 103,197"/>
    <polyline class="route-main" points="130,6 150,58 174,102 191,136"/>
    <polyline class="route-main" points="277,93 260,112 242,125 222,135"/>
    <polyline class="route-main" points="38,286 54,227 126,207 103,197"/>
    <polyline class="route-extract" points="191,136 145,150 137,102"/>
    <polyline class="route-extract" points="144,224 176,235 213,252 253,274"/>
    <polyline class="route-extract" points="258,278 224,241 157,290"/>
    <polyline class="route-extract" points="277,93 247,181 224,241 157,290"/>

    <!-- 节点层：出生 / 撤离 -->
    <circle class="spawn" cx="9" cy="47" r="8"/><circle class="spawn" cx="130" cy="6" r="8"/><circle class="spawn" cx="125" cy="76" r="8"/><circle class="spawn" cx="277" cy="93" r="8"/>
    <circle class="spawn" cx="10" cy="151" r="8"/><circle class="spawn" cx="144" cy="224" r="8"/><circle class="spawn" cx="251" cy="204" r="8"/><circle class="spawn" cx="38" cy="286" r="8"/>
    <circle class="extract" cx="145" cy="150" r="8"/><circle class="extract" cx="157" cy="290" r="8"/>

    <!-- 文本层：墙体分组标签，完整 W01-W44 坐标见报告表 -->
    <rect class="tag-bg" x="40" y="15" width="28" height="10" rx="3"/><text class="wall-tag" x="54" y="20">W01</text>
    <rect class="tag-bg" x="162" y="15" width="36" height="10" rx="3"/><text class="wall-tag" x="180" y="20">W03</text>
    <rect class="tag-bg" x="274" y="72" width="28" height="10" rx="3"/><text class="wall-tag" x="288" y="77">W06</text>
    <rect class="tag-bg" x="34" y="88" width="28" height="10" rx="3"/><text class="wall-tag" x="48" y="93">W15</text>
    <rect class="tag-bg" x="84" y="112" width="28" height="10" rx="3"/><text class="wall-tag" x="98" y="117">W20</text>
    <rect class="tag-bg" x="183" y="86" width="28" height="10" rx="3"/><text class="wall-tag" x="197" y="91">W23</text>
    <rect class="tag-bg" x="253" y="198" width="28" height="10" rx="3"/><text class="wall-tag" x="267" y="203">W27</text>
    <rect class="tag-bg" x="203" y="226" width="28" height="10" rx="3"/><text class="wall-tag" x="217" y="231">W30</text>
    <rect class="tag-bg" x="93" y="234" width="28" height="10" rx="3"/><text class="wall-tag" x="107" y="239">W34</text>
    <rect class="tag-bg" x="151" y="207" width="28" height="10" rx="3"/><text class="wall-tag" x="165" y="212">W42</text>
    <rect class="tag-bg" x="221" y="247" width="28" height="10" rx="3"/><text class="wall-tag" x="235" y="252">W43</text>
    <text class="label" x="53" y="118">R01</text><text class="label" x="158" y="88">R02</text><text class="label" x="254" y="118">R03</text>
    <text class="label" x="66" y="236">R05</text><text class="label" x="165" y="147">R06</text><text class="label" x="214" y="248">R07/R08</text>
  </g>

  <!-- 文本层：右侧坐标与路线说明 -->
  <g>
    <rect class="panel" x="540" y="88" width="220" height="410" rx="12"/>
    <text class="legend-title" x="562" y="118">坐标规则</text>
    <text class="note" x="562" y="146">
      <tspan x="562" dy="0">原点：左下角 (0,0)</tspan>
      <tspan x="562" dy="18">右上角：(300,300)</tspan>
      <tspan x="562" dy="18">矩形：左下 x,y,w,h</tspan>
      <tspan x="562" dy="18">墙体：Wxx 起点 -> 终点</tspan>
    </text>

    <text class="legend-title" x="562" y="236">核心路线</text>
    <text class="coord" x="562" y="264">R01 S01 -> T0：9,253 -> 103,103</text>
    <text class="coord" x="562" y="284">R02 S02 -> T1：130,294 -> 191,164</text>
    <text class="coord" x="562" y="304">R03 S04 -> 中路：277,207 -> 222,165</text>
    <text class="coord" x="562" y="324">R05 S08 -> T0：38,14 -> 103,103</text>
    <text class="coord" x="562" y="344">R06 T1 -> 中撤：191,164 -> 137,198</text>
    <text class="coord" x="562" y="364">R07 T1 -> 南撤：258,22 -> 157,10</text>
    <text class="coord" x="562" y="384">R08 右侧 -> 南撤：277,207 -> 157,10</text>

    <text class="legend-title" x="562" y="426">读图约束</text>
    <text class="note" x="562" y="452">
      <tspan x="562" dy="0">完整 W01-W44 坐标见正文总表。</tspan>
      <tspan x="562" dy="18">图面只标关键墙组，避免遮挡。</tspan>
      <tspan x="562" dy="18">路线点为灰盒锚点，可在编辑器微调。</tspan>
    </text>
  </g>
</svg>
