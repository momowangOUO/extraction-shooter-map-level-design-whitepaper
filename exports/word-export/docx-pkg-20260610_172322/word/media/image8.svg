<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">首轮接敌时间窗</title>
  <desc id="desc">把 25 分钟单局前 4 分钟拆为安全展开、首轮接敌、主动争夺三个时间窗。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#fef3c7"/></linearGradient>
    <linearGradient id="safe" x1="0" x2="1"><stop offset="0" stop-color="#dcfce7"/><stop offset="1" stop-color="#bbf7d0"/></linearGradient>
    <linearGradient id="contact" x1="0" x2="1"><stop offset="0" stop-color="#fef3c7"/><stop offset="1" stop-color="#fed7aa"/></linearGradient>
    <linearGradient id="fight" x1="0" x2="1"><stop offset="0" stop-color="#fee2e2"/><stop offset="1" stop-color="#fecaca"/></linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#111827" flood-opacity=".13"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M1 1 L9 5 L1 9 Z" fill="#475569"/></marker>
  </defs>
  <style>
    .h1{font:700 24px "Microsoft YaHei",Arial,sans-serif;fill:#111827}.sub{font:400 12px "Microsoft YaHei",Arial,sans-serif;fill:#64748b}.panel{fill:#fff;stroke:#e2e8f0;filter:url(#soft-shadow)}.axis{stroke:#334155;stroke-width:3;marker-end:url(#arrow)}.tick{stroke:#64748b;stroke-width:2}.win{stroke:#fff;stroke-width:2;filter:url(#soft-shadow)}.label{font:700 14px "Microsoft YaHei",Arial,sans-serif;fill:#111827;text-anchor:middle}.cap{font:400 11px "Microsoft YaHei",Arial,sans-serif;fill:#64748b;text-anchor:middle}.left{font:700 12px "Microsoft YaHei",Arial,sans-serif;fill:#111827}.small{font:400 11px "Microsoft YaHei",Arial,sans-serif;fill:#64748b}
  </style>

  <!-- 背景层 -->
  <rect width="800" height="600" rx="18" fill="url(#bg)"/>
  <text class="h1" x="46" y="42">首轮接敌时间窗</text>
  <text class="sub" x="46" y="64">室内短视距地图不能 30 秒乱斗，也不能 5 分钟无声。Demo v0 需要明确前 4 分钟的节奏。</text>

  <!-- 连线层 -->
  <line class="axis" x1="84" y1="314" x2="710" y2="314"/>
  <g>
    <line class="tick" x1="84" y1="300" x2="84" y2="328"/><line class="tick" x1="201" y1="300" x2="201" y2="328"/><line class="tick" x1="396" y1="300" x2="396" y2="328"/><line class="tick" x1="708" y1="300" x2="708" y2="328"/>
  </g>

  <!-- 节点层 -->
  <rect class="win" x="84" y="176" width="117" height="88" rx="12" fill="url(#safe)"/>
  <rect class="win" x="201" y="176" width="195" height="88" rx="12" fill="url(#contact)"/>
  <rect class="win" x="396" y="176" width="312" height="88" rx="12" fill="url(#fight)"/>
  <rect class="panel" x="86" y="374" width="180" height="94" rx="12"/>
  <rect class="panel" x="310" y="374" width="180" height="94" rx="12"/>
  <rect class="panel" x="534" y="374" width="180" height="94" rx="12"/>

  <!-- 文本层 -->
  <text class="label" x="142" y="210">0-45 秒</text><text class="cap" x="142" y="236">安全展开</text>
  <text class="label" x="298" y="210">45-120 秒</text><text class="cap" x="298" y="236">首轮接敌</text>
  <text class="label" x="552" y="210">120-240 秒</text><text class="cap" x="552" y="236">主动争夺</text>
  <text class="small" x="74" y="354">0</text><text class="small" x="184" y="354">45s</text><text class="small" x="374" y="354">120s</text><text class="small" x="690" y="354">240s</text>
  <text class="left" x="112" y="406">合格体验</text><text class="small" x="112" y="430">开 1-2 个基础容器，听到</text><text class="small" x="112" y="448">邻近动静但不被迫团战</text>
  <text class="left" x="336" y="406">风险信号</text><text class="small" x="336" y="430">30 秒内死亡集中，说明</text><text class="small" x="336" y="448">出生或门槛压得太近</text>
  <text class="left" x="560" y="406">调整手段</text><text class="small" x="560" y="430">补 T3 缓冲、移动门槛、</text><text class="small" x="560" y="448">增加听觉前摇和小怪</text>
</svg>
