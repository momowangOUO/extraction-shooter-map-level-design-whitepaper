<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">25 分钟局内压力曲线</title>
  <desc id="desc">展示 25 分钟单局从出生展开、构筑、争夺、带宝到撤离终局的压力曲线。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#f5f3ff"/></linearGradient>
    <linearGradient id="line" x1="0" x2="1"><stop offset="0" stop-color="#16a34a"/><stop offset=".45" stop-color="#d97706"/><stop offset="1" stop-color="#dc3b34"/></linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#111827" flood-opacity=".14"/></filter>
  </defs>
  <style>
    .h1{font:700 24px "Microsoft YaHei",Arial,sans-serif;fill:#111827}.sub{font:400 12px "Microsoft YaHei",Arial,sans-serif;fill:#64748b}.panel{fill:#fff;stroke:#e2e8f0;filter:url(#soft-shadow)}.grid{stroke:#e2e8f0;stroke-width:1}.axis{stroke:#334155;stroke-width:2}.curve{fill:none;stroke:url(#line);stroke-width:5;stroke-linecap:round}.area{fill:#f97316;opacity:.08}.dot{fill:#fff;stroke:#334155;stroke-width:2}.label{font:700 12px "Microsoft YaHei",Arial,sans-serif;fill:#111827;text-anchor:middle}.cap{font:400 10.5px "Microsoft YaHei",Arial,sans-serif;fill:#64748b;text-anchor:middle}.tag{font:700 11px "Microsoft YaHei",Arial,sans-serif;fill:#fff;text-anchor:middle;dominant-baseline:middle}.b1{fill:#16a34a}.b2{fill:#d97706}.b3{fill:#dc3b34}.b4{fill:#6d28d9}
  </style>

  <!-- 背景层 -->
  <rect width="800" height="600" rx="18" fill="url(#bg)"/>
  <text class="h1" x="46" y="42">25 分钟局内压力曲线</text>
  <text class="sub" x="46" y="64">通过资源、怪物、撤离和诅咒信号推动决策，不依赖单一强制收圈。</text>

  <!-- 节点层 -->
  <rect class="panel" x="72" y="104" width="650" height="338" rx="14"/>
  <g>
    <path class="grid" d="M128 158 H674 M128 218 H674 M128 278 H674 M128 338 H674 M128 398 H674"/>
    <path class="grid" d="M128 158 V398 M237 158 V398 M346 158 V398 M455 158 V398 M564 158 V398 M674 158 V398"/>
    <line class="axis" x1="128" y1="398" x2="674" y2="398"/><line class="axis" x1="128" y1="158" x2="128" y2="398"/>
    <path class="area" d="M128 386 C210 358 256 334 312 300 C386 254 458 218 532 190 C596 168 642 170 674 168 L674 398 L128 398 Z"/>
  </g>

  <!-- 连线层 -->
  <path class="curve" d="M128 386 C200 360 258 330 312 300 C382 258 455 220 532 190 C596 168 642 170 674 168"/>

  <!-- 文本层 -->
  <g>
    <circle class="dot" cx="128" cy="386" r="6"/><circle class="dot" cx="237" cy="346" r="6"/><circle class="dot" cx="346" cy="282" r="6"/><circle class="dot" cx="455" cy="220" r="6"/><circle class="dot" cx="564" cy="184" r="6"/><circle class="dot" cx="674" cy="168" r="6"/>
    <text class="cap" x="128" y="424">0</text><text class="cap" x="237" y="424">5</text><text class="cap" x="346" y="424">10</text><text class="cap" x="455" y="424">15</text><text class="cap" x="564" y="424">20</text><text class="cap" x="674" y="424">25 分钟</text>
    <rect class="b1" x="96" y="464" width="108" height="34" rx="8"/><text class="tag" x="150" y="481">0-3 出生展开</text>
    <rect class="b2" x="222" y="464" width="126" height="34" rx="8"/><text class="tag" x="285" y="481">3-8 构筑接敌</text>
    <rect class="b4" x="366" y="464" width="132" height="34" rx="8"/><text class="tag" x="432" y="481">8-15 中心争夺</text>
    <rect class="b2" x="516" y="464" width="118" height="34" rx="8"/><text class="tag" x="575" y="481">15-20 带宝</text>
    <rect class="b3" x="652" y="464" width="92" height="34" rx="8"/><text class="tag" x="698" y="481">20-25 终局</text>
  </g>

  <rect class="panel" x="96" y="522" width="608" height="42" rx="10"/>
  <text class="sub" x="118" y="548">终局压力建议：T0 模糊信号、裂隙不稳定、巡逻增强、读条音效变远，但不把所有人赶进同一门口。</text>
</svg>
