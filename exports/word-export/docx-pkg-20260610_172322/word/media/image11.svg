<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">房间技能半径验收图</title>
  <desc id="desc">把突进、控制、AOE、侦测等技能半径画入室内房间，用于检查地图是否能接住职业差异。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#fff7ed"/></linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#111827" flood-opacity=".14"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M1 1 L9 5 L1 9 Z" fill="#475569"/></marker>
  </defs>
  <style>
    .h1{font:700 24px "Microsoft YaHei",Arial,sans-serif;fill:#111827}.sub{font:400 12px "Microsoft YaHei",Arial,sans-serif;fill:#64748b}.panel{fill:#fff;stroke:#e2e8f0;filter:url(#soft-shadow)}.room{fill:#f3f4f6;stroke:#334155;stroke-width:2}.wall{fill:#334155}.player{fill:#fff;stroke:#111827;stroke-width:2}.dash{fill:none;stroke:#16a34a;stroke-width:4;marker-end:url(#arrow);stroke-linecap:round}.cc{fill:#6d28d9;opacity:.14;stroke:#6d28d9;stroke-width:2}.aoe{fill:#dc3b34;opacity:.12;stroke:#dc3b34;stroke-width:2;stroke-dasharray:7 6}.detect{fill:#0ea5e9;opacity:.10;stroke:#0ea5e9;stroke-width:2}.label{font:700 13px "Microsoft YaHei",Arial,sans-serif;fill:#111827;text-anchor:middle}.cap{font:400 10.5px "Microsoft YaHei",Arial,sans-serif;fill:#64748b;text-anchor:middle}.white{font:700 11px "Microsoft YaHei",Arial,sans-serif;fill:#fff;text-anchor:middle;dominant-baseline:middle}.badge{fill:#1f2937}
  </style>

  <!-- 背景层 -->
  <rect width="800" height="600" rx="18" fill="url(#bg)"/>
  <text class="h1" x="46" y="42">房间技能半径验收</text>
  <text class="sub" x="46" y="64">灰盒阶段必须把技能画进房间，而不是等数值平衡兜底。</text>

  <!-- 节点层 -->
  <rect class="panel" x="54" y="104" width="318" height="354" rx="14"/>
  <rect class="panel" x="428" y="104" width="318" height="354" rx="14"/>
  <rect class="room" x="92" y="172" width="240" height="196" rx="10"/>
  <rect class="wall" x="204" y="172" width="20" height="84" rx="4"/>
  <circle class="detect" cx="160" cy="276" r="76"/>
  <circle class="cc" cx="214" cy="270" r="46"/>
  <path class="dash" d="M130 320 C158 292 188 280 224 270"/>
  <circle class="player" cx="130" cy="320" r="14"/><circle class="player" cx="230" cy="268" r="14"/>
  <rect class="room" x="466" y="172" width="240" height="196" rx="10"/>
  <rect class="wall" x="580" y="172" width="20" height="196" rx="4"/>
  <circle class="aoe" cx="586" cy="270" r="92"/>
  <path class="dash" d="M502 320 C540 280 580 254 640 226"/>
  <circle class="player" cx="502" cy="320" r="14"/><circle class="player" cx="646" cy="224" r="14"/>

  <!-- 文本层 -->
  <text class="label" x="213" y="136">合格：房间接住技能</text>
  <text class="cap" x="213" y="396">突进到门槛后仍有后摇风险；控制半径不能封死全屋</text>
  <text class="cap" x="213" y="416">侦测能探疑点，但不会删除全部隐蔽</text>
  <text class="label" x="587" y="136">风险：技能压过地图</text>
  <text class="cap" x="587" y="396">突进跨完整房间，AOE 覆盖主要活动区</text>
  <text class="cap" x="587" y="416">唯一门被控制链或召唤物永久封死</text>
  <rect class="badge" x="110" y="212" width="70" height="28" rx="7"/><text class="white" x="145" y="226">侦测区</text>
  <rect class="badge" x="548" y="212" width="78" height="28" rx="7"/><text class="white" x="587" y="226">AOE 过大</text>
  <rect class="panel" x="86" y="508" width="628" height="42" rx="10"/>
  <text class="sub" x="110" y="534">验收线：常规 AOE 不覆盖普通房间 70% 以上；高价值房至少 2 入口；撤离点禁止无限控制打断。</text>
</svg>
