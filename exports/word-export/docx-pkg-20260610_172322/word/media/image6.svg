<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">Demo v0 点位规格表</title>
  <desc id="desc">将 H、C、E、M、B、D 点位拆成坐标、区域、用途和调参关注点，减少地图图面文字重叠。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#f5f3ff"/></linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#111827" flood-opacity=".14"/></filter>
  </defs>
  <style>
    .h1{font:700 24px "Microsoft YaHei",Arial,sans-serif;fill:#111827}.sub{font:400 12px "Microsoft YaHei",Arial,sans-serif;fill:#64748b}.panel{fill:#fff;stroke:#e2e8f0;filter:url(#soft-shadow)}.head{fill:#1f2937}.hrow{fill:#dcfce7}.crow{fill:#fef3c7}.erow{fill:#e2e8f0}.mrow{fill:#fee2e2}.drow{fill:#e0f2fe}.grid{stroke:#e2e8f0;stroke-width:1}.white{font:700 11px "Microsoft YaHei",Arial,sans-serif;fill:#fff;text-anchor:middle;dominant-baseline:middle}.txt{font:700 9.5px "Microsoft YaHei",Arial,sans-serif;fill:#111827;text-anchor:middle;dominant-baseline:middle}.note{font:400 8.8px "Microsoft YaHei",Arial,sans-serif;fill:#475569;text-anchor:middle;dominant-baseline:middle}.left{font:700 10px "Microsoft YaHei",Arial,sans-serif;fill:#111827}.cap{font:400 10.5px "Microsoft YaHei",Arial,sans-serif;fill:#64748b}
  </style>

  <!-- 背景层 -->
  <rect width="800" height="600" rx="18" fill="url(#bg)"/>
  <text class="h1" x="44" y="40">Demo v0 点位规格表</text>
  <text class="sub" x="44" y="62">坐标为左下原点、Y 向上的 0-300 灰盒设计坐标；地图只展示标签，具体设计含义在此表落地。</text>

  <!-- 节点层：H 隐蔽点 -->
  <rect class="panel" x="38" y="92" width="350" height="182" rx="12"/>
  <rect class="head" x="38" y="92" width="350" height="28" rx="10"/>
  <text class="white" x="80" y="106">H</text><text class="white" x="145" y="106">坐标</text><text class="white" x="220" y="106">区域</text><text class="white" x="310" y="106">用途</text>
  <g>
    <rect class="hrow" x="38" y="120" width="350" height="22"/><rect class="hrow" x="38" y="142" width="350" height="22"/><rect class="hrow" x="38" y="164" width="350" height="22"/><rect class="hrow" x="38" y="186" width="350" height="22"/><rect class="hrow" x="38" y="208" width="350" height="22"/><rect class="hrow" x="38" y="230" width="350" height="22"/><rect class="hrow" x="38" y="252" width="350" height="22"/>
    <path class="grid" d="M112 92 V274 M178 92 V274 M262 92 V274 M38 120 H388 M38 142 H388 M38 164 H388 M38 186 H388 M38 208 H388 M38 230 H388 M38 252 H388"/>
  </g>
  <text class="txt" x="80" y="132">H1</text><text class="note" x="145" y="132">63,214</text><text class="note" x="220" y="132">A 左上</text><text class="note" x="310" y="132">教学伏击/脱战</text>
  <text class="txt" x="80" y="154">H2</text><text class="note" x="145" y="154">137,198</text><text class="note" x="220" y="154">C 边缘</text><text class="note" x="310" y="154">转角探草</text>
  <text class="txt" x="80" y="176">H3</text><text class="note" x="145" y="176">228,179</text><text class="note" x="220" y="176">E 右中</text><text class="note" x="310" y="176">截击观察</text>
  <text class="txt" x="80" y="198">H4</text><text class="note" x="145" y="198">247,119</text><text class="note" x="220" y="198">F 北口</text><text class="note" x="310" y="198">带宝撤退雾</text>
  <text class="txt" x="80" y="220">H5</text><text class="note" x="145" y="220">126,93</text><text class="note" x="220" y="220">D 高险</text><text class="note" x="310" y="220">T0 潜入</text>
  <text class="txt" x="80" y="242">H6</text><text class="note" x="145" y="242">54,73</text><text class="note" x="220" y="242">D 外环</text><text class="note" x="310" y="242">单排转线</text>
  <text class="txt" x="80" y="264">H7</text><text class="note" x="145" y="264">224,59</text><text class="note" x="220" y="264">F 前厅</text><text class="note" x="310" y="264">撤离前博弈</text>

  <!-- 节点层：C 容器 -->
  <rect class="panel" x="412" y="92" width="350" height="204" rx="12"/>
  <rect class="head" x="412" y="92" width="350" height="28" rx="10"/>
  <text class="white" x="454" y="106">C</text><text class="white" x="519" y="106">坐标</text><text class="white" x="594" y="106">区域</text><text class="white" x="690" y="106">用途</text>
  <g>
    <rect class="crow" x="412" y="120" width="350" height="22"/><rect class="crow" x="412" y="142" width="350" height="22"/><rect class="crow" x="412" y="164" width="350" height="22"/><rect class="crow" x="412" y="186" width="350" height="22"/><rect class="crow" x="412" y="208" width="350" height="22"/><rect class="crow" x="412" y="230" width="350" height="22"/><rect class="crow" x="412" y="252" width="350" height="22"/><rect class="crow" x="412" y="274" width="350" height="22"/>
    <path class="grid" d="M486 92 V296 M552 92 V296 M636 92 V296 M412 120 H762 M412 142 H762 M412 164 H762 M412 186 H762 M412 208 H762 M412 230 H762 M412 252 H762 M412 274 H762"/>
  </g>
  <text class="txt" x="454" y="132">C1</text><text class="note" x="519" y="132">50,254</text><text class="note" x="594" y="132">A T2</text><text class="note" x="690" y="132">基础材料</text>
  <text class="txt" x="454" y="154">C2</text><text class="note" x="519" y="154">264,271</text><text class="note" x="594" y="154">B T2</text><text class="note" x="690" y="154">右上成长</text>
  <text class="txt" x="454" y="176">C3</text><text class="note" x="519" y="176">99,182</text><text class="note" x="594" y="176">C T2</text><text class="note" x="690" y="176">转中补点</text>
  <text class="txt" x="454" y="198">C4</text><text class="note" x="519" y="198">191,163</text><text class="note" x="594" y="198">C T1</text><text class="note" x="690" y="198">中心高值</text>
  <text class="txt" x="454" y="220">C5</text><text class="note" x="519" y="220">260,170</text><text class="note" x="594" y="220">E T2</text><text class="note" x="690" y="220">截击补给</text>
  <text class="txt" x="454" y="242">C6</text><text class="note" x="519" y="242">77,110</text><text class="note" x="594" y="242">D T1</text><text class="note" x="690" y="242">引向 T0</text>
  <text class="txt" x="454" y="264">C7</text><text class="note" x="519" y="264">188,100</text><text class="note" x="594" y="264">中下 T2</text><text class="note" x="690" y="264">替代成长</text>
  <text class="txt" x="454" y="286">C8</text><text class="note" x="519" y="286">258,22</text><text class="note" x="594" y="286">F T1</text><text class="note" x="690" y="286">带宝诱惑</text>

  <!-- 节点层：E 怪物 -->
  <rect class="panel" x="38" y="312" width="350" height="204" rx="12"/>
  <rect class="head" x="38" y="312" width="350" height="28" rx="10"/>
  <text class="white" x="80" y="326">E</text><text class="white" x="145" y="326">坐标</text><text class="white" x="220" y="326">区域</text><text class="white" x="310" y="326">用途</text>
  <g>
    <rect class="erow" x="38" y="340" width="350" height="22"/><rect class="erow" x="38" y="362" width="350" height="22"/><rect class="erow" x="38" y="384" width="350" height="22"/><rect class="erow" x="38" y="406" width="350" height="22"/><rect class="erow" x="38" y="428" width="350" height="22"/><rect class="erow" x="38" y="450" width="350" height="22"/><rect class="erow" x="38" y="472" width="350" height="22"/><rect class="erow" x="38" y="494" width="350" height="22"/>
    <path class="grid" d="M112 312 V516 M178 312 V516 M262 312 V516 M38 340 H388 M38 362 H388 M38 384 H388 M38 406 H388 M38 428 H388 M38 450 H388 M38 472 H388 M38 494 H388"/>
  </g>
  <text class="txt" x="80" y="352">E1</text><text class="note" x="145" y="352">58,224</text><text class="note" x="220" y="352">A</text><text class="note" x="310" y="352">开局声源</text>
  <text class="txt" x="80" y="374">E2</text><text class="note" x="145" y="374">140,224</text><text class="note" x="220" y="374">中上</text><text class="note" x="310" y="374">通路节奏</text>
  <text class="txt" x="80" y="396">E3</text><text class="note" x="145" y="396">241,209</text><text class="note" x="220" y="396">B/E</text><text class="note" x="310" y="396">巡逻提示</text>
  <text class="txt" x="80" y="418">E4</text><text class="note" x="145" y="418">37,143</text><text class="note" x="220" y="418">左中</text><text class="note" x="310" y="418">阻止无声穿越</text>
  <text class="txt" x="80" y="440">E5</text><text class="note" x="145" y="440">178,127</text><text class="note" x="220" y="440">C</text><text class="note" x="310" y="440">扰动中心蹲守</text>
  <text class="txt" x="80" y="462">E6</text><text class="note" x="145" y="462">240,92</text><text class="note" x="220" y="462">E/F</text><text class="note" x="310" y="462">截击声源</text>
  <text class="txt" x="80" y="484">E7</text><text class="note" x="145" y="484">86,41</text><text class="note" x="220" y="484">D</text><text class="note" x="310" y="484">单排路线代价</text>
  <text class="txt" x="80" y="506">E8</text><text class="note" x="145" y="506">181,41</text><text class="note" x="220" y="506">F</text><text class="note" x="310" y="506">反撤离蹲点</text>

  <!-- 节点层：M/B/D -->
  <rect class="panel" x="412" y="312" width="350" height="204" rx="12"/>
  <rect class="head" x="412" y="312" width="350" height="28" rx="10"/>
  <text class="white" x="452" y="326">点位</text><text class="white" x="522" y="326">坐标</text><text class="white" x="604" y="326">类型</text><text class="white" x="700" y="326">调参关注</text>
  <g>
    <rect class="mrow" x="412" y="340" width="350" height="26"/><rect class="mrow" x="412" y="366" width="350" height="26"/><rect class="mrow" x="412" y="392" width="350" height="26"/>
    <rect class="drow" x="412" y="418" width="350" height="24"/><rect class="drow" x="412" y="442" width="350" height="24"/><rect class="drow" x="412" y="466" width="350" height="24"/><rect class="drow" x="412" y="490" width="350" height="26"/>
    <path class="grid" d="M486 312 V516 M558 312 V516 M650 312 V516 M412 340 H762 M412 366 H762 M412 392 H762 M412 418 H762 M412 442 H762 M412 466 H762 M412 490 H762"/>
  </g>
  <text class="txt" x="452" y="353">M1</text><text class="note" x="522" y="353">198,170</text><text class="note" x="604" y="353">中心精英</text><text class="note" x="700" y="353">打断前摇</text>
  <text class="txt" x="452" y="379">M2</text><text class="note" x="522" y="379">268,32</text><text class="note" x="604" y="379">右下精英</text><text class="note" x="700" y="379">追击距离</text>
  <text class="txt" x="452" y="405">B</text><text class="note" x="522" y="405">103,103</text><text class="note" x="604" y="405">T0 事件</text><text class="note" x="700" y="405">仪式/诅咒</text>
  <text class="txt" x="452" y="430">D1</text><text class="note" x="522" y="430">118,198</text><text class="note" x="604" y="430">探 H2</text><text class="note" x="700" y="430">半径/冷却</text>
  <text class="txt" x="452" y="454">D2</text><text class="note" x="522" y="454">223,180</text><text class="note" x="604" y="454">探 H3</text><text class="note" x="700" y="454">角度/声源</text>
  <text class="txt" x="452" y="478">D3</text><text class="note" x="522" y="478">137,94</text><text class="note" x="604" y="478">探 H5</text><text class="note" x="700" y="478">扫描时长</text>
  <text class="txt" x="452" y="503">D4</text><text class="note" x="522" y="503">220,60</text><text class="note" x="604" y="503">探 H7</text><text class="note" x="700" y="503">使用次数</text>

  <!-- 文本层 -->
  <rect class="panel" x="78" y="540" width="644" height="34" rx="10"/>
  <text class="cap" x="104" y="562">进入灰盒前，每个点位都必须能说明：坐标、目的、玩家读法、反制方式、可调参数。否则先不摆。</text>
</svg>
