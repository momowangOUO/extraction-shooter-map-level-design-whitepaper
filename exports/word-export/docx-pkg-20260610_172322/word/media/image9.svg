<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">隐蔽点合规与违规示意</title>
  <desc id="desc">对比合规隐蔽组和违规贴门隐蔽，强调伏击、探测、反绕、撤退代价四件套。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#ecfdf5"/></linearGradient>
    <linearGradient id="mist" x1="0" x2="1"><stop offset="0" stop-color="#14532d"/><stop offset="1" stop-color="#22c55e"/></linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#111827" flood-opacity=".14"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M1 1 L9 5 L1 9 Z" fill="#475569"/></marker>
  </defs>
  <style>
    .h1{font:700 24px "Microsoft YaHei",Arial,sans-serif;fill:#111827}.sub{font:400 12px "Microsoft YaHei",Arial,sans-serif;fill:#64748b}.panel{fill:#fff;stroke:#e2e8f0;filter:url(#soft-shadow)}.room{fill:#f3f4f6;stroke:#334155;stroke-width:2}.wall{fill:#334155}.mist{fill:url(#mist);filter:url(#soft-shadow)}.bad{fill:#dc3b34;opacity:.86}.route{fill:none;stroke:#475569;stroke-width:2.5;stroke-dasharray:7 6;marker-end:url(#arrow)}.detect{fill:none;stroke:#0ea5e9;stroke-width:2;stroke-dasharray:6 5}.label{font:700 13px "Microsoft YaHei",Arial,sans-serif;fill:#111827;text-anchor:middle}.cap{font:400 10.5px "Microsoft YaHei",Arial,sans-serif;fill:#64748b;text-anchor:middle}.white{font:700 11px "Microsoft YaHei",Arial,sans-serif;fill:#fff;text-anchor:middle;dominant-baseline:middle}.ok{fill:#16a34a}.no{fill:#dc3b34}
  </style>

  <!-- 背景层 -->
  <rect width="800" height="600" rx="18" fill="url(#bg)"/>
  <text class="h1" x="46" y="42">隐蔽点布置：合规与违规</text>
  <text class="sub" x="46" y="64">草丛/幽雾必须成组设计：伏击价值、探测反制、反绕路径、撤退代价。</text>

  <!-- 节点层 -->
  <rect class="panel" x="50" y="104" width="326" height="374" rx="14"/>
  <rect class="panel" x="424" y="104" width="326" height="374" rx="14"/>
  <rect class="room" x="82" y="168" width="260" height="190" rx="10"/>
  <rect class="wall" x="204" y="168" width="18" height="82" rx="4"/>
  <ellipse class="mist" cx="274" cy="268" rx="48" ry="28"/><text class="white" x="274" y="268">幽雾</text>
  <circle class="detect" cx="168" cy="252" r="42"/><text class="cap" x="168" y="306">探测点</text>
  <rect class="room" x="456" y="168" width="260" height="190" rx="10"/>
  <rect class="wall" x="580" y="168" width="18" height="190" rx="4"/>
  <ellipse class="mist" cx="600" cy="250" rx="50" ry="30"/><rect class="bad" x="570" y="214" width="60" height="72" rx="8"/><text class="white" x="600" y="250">贴门</text>
  <circle class="no" cx="680" cy="250" r="18"/><text class="white" x="680" y="250">撤</text>

  <!-- 连线层 -->
  <path class="route" d="M116 326 C162 356 234 354 288 318"/>
  <path class="route" d="M138 210 C178 186 218 188 252 228"/>
  <path class="route" d="M492 326 C534 300 560 272 586 252"/>

  <!-- 文本层 -->
  <text class="label" x="213" y="138">合规隐蔽组</text>
  <text class="cap" x="213" y="386">伏击点偏离主门，探测点和反绕路线同时存在</text>
  <text class="cap" x="213" y="406">攻击后显形或发声，失败方有撤退窗口</text>
  <text class="label" x="587" y="138">违规贴门隐蔽</text>
  <text class="cap" x="587" y="386">草丛贴出生、撤离或唯一门口会变成低成本秒杀</text>
  <text class="cap" x="587" y="406">近战控制链会把门槛变成必死点</text>
  <circle class="ok" cx="100" cy="138" r="12"/><text class="white" x="100" y="138">✓</text>
  <circle class="no" cx="474" cy="138" r="12"/><text class="white" x="474" y="138">!</text>
  <rect class="panel" x="86" y="510" width="628" height="42" rx="10"/>
  <text class="sub" x="110" y="536">落地规则：中心撤离和南部撤离附近只允许“可被探测、可被反绕、偏离传送门”的隐蔽点。</text>
</svg>
