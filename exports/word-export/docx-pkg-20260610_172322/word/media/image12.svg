<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">角色技能与空间矩阵</title>
  <desc id="desc">技能矩阵使用固定列宽与行高，长文本通过 tspan 两行折行居中。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#fbf7ef"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#1c1917" flood-opacity=".14"/></filter>
  </defs>
  <style>
    .h1{font:700 25px "Microsoft YaHei",Arial,sans-serif;fill:#1c1917}.sub{font:400 12px "Microsoft YaHei",Arial,sans-serif;fill:#78716c}.panel{fill:#fffaf0;stroke:#d6c7ad;filter:url(#soft-shadow)}.head{fill:#44403c}.good{fill:#dcfce7}.mid{fill:#fef3c7}.risk{fill:#ffe4e6}.grid{stroke:#d6c7ad;stroke-width:1}.txt{font:700 10.8px "Microsoft YaHei",Arial,sans-serif;fill:#1c1917;text-anchor:middle;dominant-baseline:middle}.note{font:400 9.2px "Microsoft YaHei",Arial,sans-serif;fill:#57534e;text-anchor:middle;dominant-baseline:middle}.white{font:700 10.8px "Microsoft YaHei",Arial,sans-serif;fill:#fff;text-anchor:middle;dominant-baseline:middle}
  </style>
  <!-- 背景层 -->
  <rect width="800" height="600" rx="18" fill="url(#bg)"/>
  <text class="h1" x="48" y="52">角色技能与空间矩阵</text>
  <text class="sub" x="48" y="76">近战 ARPG 搜打撤不能只平衡数值；地图就是技能平衡的一部分。</text>

  <!-- 节点层 / 表格层：x=48 y=118，col=[92,142,142,142,142] row=72 -->
  <rect class="panel" x="48" y="118" width="660" height="360" rx="12"/>
  <g>
    <rect class="head" x="48" y="118" width="92" height="52" rx="10"/><rect class="head" x="140" y="118" width="142" height="52"/><rect class="head" x="282" y="118" width="142" height="52"/><rect class="head" x="424" y="118" width="142" height="52"/><rect class="head" x="566" y="118" width="142" height="52" rx="10"/>
    <rect class="good" x="48" y="170" width="92" height="72"/><rect class="good" x="140" y="170" width="142" height="72"/><rect class="mid" x="282" y="170" width="142" height="72"/><rect class="risk" x="424" y="170" width="142" height="72"/><rect class="good" x="566" y="170" width="142" height="72"/>
    <rect class="good" x="48" y="242" width="92" height="72"/><rect class="good" x="140" y="242" width="142" height="72"/><rect class="mid" x="282" y="242" width="142" height="72"/><rect class="risk" x="424" y="242" width="142" height="72"/><rect class="good" x="566" y="242" width="142" height="72"/>
    <rect class="good" x="48" y="314" width="92" height="72"/><rect class="good" x="140" y="314" width="142" height="72"/><rect class="mid" x="282" y="314" width="142" height="72"/><rect class="risk" x="424" y="314" width="142" height="72"/><rect class="good" x="566" y="314" width="142" height="72"/>
    <rect class="good" x="48" y="386" width="92" height="92" rx="10"/><rect class="good" x="140" y="386" width="142" height="92"/><rect class="mid" x="282" y="386" width="142" height="92"/><rect class="risk" x="424" y="386" width="142" height="92"/><rect class="good" x="566" y="386" width="142" height="92" rx="10"/>
    <path class="grid" d="M140 118v360M282 118v360M424 118v360M566 118v360M48 170h660M48 242h660M48 314h660M48 386h660"/>
  </g>

  <!-- 文本层 -->
  <g>
    <text class="white" x="94" y="144">技能类型</text><text class="white" x="211" y="144">需要空间</text><text class="white" x="353" y="144">地图反制</text><text class="white" x="495" y="144">失衡信号</text><text class="white" x="637" y="144">验收重点</text>
    <text class="txt" x="94" y="206">突进</text><text class="note" x="211" y="198"><tspan x="211" dy="0">短走廊 / 柱体</tspan><tspan x="211" dy="16">不穿全屋</tspan></text><text class="note" x="353" y="198"><tspan x="353" dy="0">转角、减速区</tspan><tspan x="353" dy="16">可预判前摇</tspan></text><text class="note" x="495" y="198"><tspan x="495" dy="0">贴脸无代价</tspan><tspan x="495" dy="16">退场也安全</tspan></text><text class="note" x="637" y="198"><tspan x="637" dy="0">入场后退路</tspan><tspan x="637" dy="16">反打窗口</tspan></text>
    <text class="txt" x="94" y="278">控制</text><text class="note" x="211" y="270"><tspan x="211" dy="0">门槛 / 中庭</tspan><tspan x="211" dy="16">侧向躲避</tspan></text><text class="note" x="353" y="270"><tspan x="353" dy="0">多入口、净化</tspan><tspan x="353" dy="16">控制衰减</tspan></text><text class="note" x="495" y="270"><tspan x="495" dy="0">门口控制链</tspan><tspan x="495" dy="16">读条无解</tspan></text><text class="note" x="637" y="270"><tspan x="637" dy="0">绕开控制轴</tspan><tspan x="637" dy="16">技能空窗</tspan></text>
    <text class="txt" x="94" y="350">侦测</text><text class="note" x="211" y="342"><tspan x="211" dy="0">草丛边缘</tspan><tspan x="211" dy="16">有落点</tspan></text><text class="note" x="353" y="342"><tspan x="353" dy="0">冷却范围限制</tspan><tspan x="353" dy="16">可被误导</tspan></text><text class="note" x="495" y="342"><tspan x="495" dy="0">草丛全失效</tspan><tspan x="495" dy="16">伏击无意义</tspan></text><text class="note" x="637" y="342"><tspan x="637" dy="0">探草有成本</tspan><tspan x="637" dy="16">能反侦测</tspan></text>
    <text class="txt" x="94" y="432">召唤/陷阱</text><text class="note" x="211" y="424"><tspan x="211" dy="0">窄口 / 资源房</tspan><tspan x="211" dy="16">限制不封死</tspan></text><text class="note" x="353" y="424"><tspan x="353" dy="0">清理路径</tspan><tspan x="353" dy="16">绕行支路</tspan></text><text class="note" x="495" y="424"><tspan x="495" dy="0">无限堵门</tspan><tspan x="495" dy="16">永久封撤离</tspan></text><text class="note" x="637" y="424"><tspan x="637" dy="0">清除成本</tspan><tspan x="637" dy="16">互动是否合理</tspan></text>
  </g>

  <rect class="panel" x="92" y="514" width="616" height="44" rx="10"/>
  <text class="sub" x="116" y="541">灰盒阶段要把技能半径画进平面图，检查是否覆盖整屋、封死门口或让草丛/撤离失效。</text>
</svg>
